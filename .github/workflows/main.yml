name: ACEest CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Stage 1: Lint & Syntax Check ─────────────────────────────────────────
  lint:
    name: "Build & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py --count --max-line-length=120 --statistics || true

  # ── Stage 2: Build Docker Image ──────────────────────────────────────────
  docker-build:
    name: "Docker Image Assembly"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness:${{ github.sha }} .
          docker images aceest-fitness

      - name: Save image as artifact
        run: docker save aceest-fitness:${{ github.sha }} | gzip > aceest-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: aceest-image.tar.gz
          retention-days: 1

  # ── Stage 3: Automated Testing inside Docker Container ───────────────────
  test:
    name: "Automated Testing (Pytest in Container)"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < aceest-image.tar.gz

      - name: Run Pytest inside Docker container
        run: |
          docker run --rm \
            --entrypoint sh \
            -e DB_NAME=":memory:" \
            aceest-fitness:${{ github.sha }} \
            -c "pytest test_app.py -v --tb=short"
